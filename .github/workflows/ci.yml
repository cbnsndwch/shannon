name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node: 
          - 22
          - 24
          - 26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      # pnpm comes from corepack, pinned (and integrity-checked) via the
      # package.json "packageManager" field — no separate setup action.
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # `pnpm test` builds with tsc then runs the compiled node:test suite, which
      # works on Node 20+. `test:src` is intentionally not run here (it needs the
      # TypeScript type-stripping in Node 22.6+).
      - run: pnpm test
